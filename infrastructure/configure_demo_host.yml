---
# Run this playbook once to configure a fresh Amazon Linux 2023 EC2 instance.
# It installs nginx, the kill service, the Datadog agent, and all required config.
#
# Usage (from your laptop, with AAP or standalone ansible):
#   ansible-playbook -i inventory.yml configure_demo_host.yml \
#     -e "dd_api_key=<YOUR_KEY>"
#
# Or run via AAP: create a Job Template pointing at this playbook.

- name: Configure EDA demo host
  hosts: demo_hosts
  become: true
  gather_facts: true

  vars:
    dd_api_key: "{{ vault_dd_api_key }}"   # store in AAP credential / vault
    demo_dir: /opt/demo

  tasks:

    # ── nginx ──────────────────────────────────────────────────────────────────

    - name: Install nginx
      ansible.builtin.dnf:
        name: nginx
        state: present

    - name: Deploy nginx site config
      ansible.builtin.copy:
        src: ../web/nginx.conf
        dest: /etc/nginx/conf.d/demo.conf
        mode: "0644"
      notify: Reload nginx

    - name: Remove default nginx server block
      ansible.builtin.file:
        path: /etc/nginx/conf.d/default.conf
        state: absent
      notify: Reload nginx

    - name: Create demo web root
      ansible.builtin.file:
        path: "{{ demo_dir }}/web"
        state: directory
        mode: "0755"
        owner: nginx
        group: nginx

    - name: Deploy demo HTML page
      ansible.builtin.copy:
        src: ../web/index.html
        dest: "{{ demo_dir }}/web/index.html"
        mode: "0644"
        owner: nginx
        group: nginx

    - name: Enable and start nginx
      ansible.builtin.service:
        name: nginx
        state: started
        enabled: true

    # ── Kill service sidecar ───────────────────────────────────────────────────

    - name: Deploy kill service script
      ansible.builtin.copy:
        src: ../web/kill_service.py
        dest: "{{ demo_dir }}/kill_service.py"
        mode: "0755"
        owner: ec2-user
        group: ec2-user

    - name: Allow ec2-user to stop nginx without password (demo only)
      ansible.builtin.copy:
        dest: /etc/sudoers.d/demo-nginx-stop
        content: |
          ec2-user ALL=(ALL) NOPASSWD: /bin/systemctl stop nginx
        mode: "0440"
        validate: "visudo -cf %s"

    - name: Install kill service systemd unit
      ansible.builtin.copy:
        src: ../web/kill.service
        dest: /etc/systemd/system/kill-service.service
        mode: "0644"
      notify: Reload systemd

    - name: Enable and start kill service
      ansible.builtin.service:
        name: kill-service
        state: started
        enabled: true

    # ── Datadog Agent ──────────────────────────────────────────────────────────

    - name: Install Datadog agent (official one-step installer)
      ansible.builtin.shell: >
        DD_API_KEY={{ dd_api_key }}
        DD_SITE="datadoghq.com"
        DD_HOST_TAGS="env:demo,app:nginx-demo,team:ansible"
        bash -c "$(curl -L https://s3.amazonaws.com/dd-agent/scripts/install_script_agent7.sh)"
      args:
        creates: /usr/bin/datadog-agent

    - name: Deploy Datadog main config
      ansible.builtin.template:
        src: ../monitoring/datadog.yaml
        dest: /etc/datadog-agent/datadog.yaml
        mode: "0640"
        owner: dd-agent
        group: dd-agent
      notify: Restart datadog-agent

    - name: Create process check config directory
      ansible.builtin.file:
        path: /etc/datadog-agent/conf.d/process.d
        state: directory
        mode: "0755"
        owner: dd-agent
        group: dd-agent

    - name: Deploy process check config
      ansible.builtin.copy:
        src: ../monitoring/process_check.yaml
        dest: /etc/datadog-agent/conf.d/process.d/conf.yaml
        mode: "0640"
        owner: dd-agent
        group: dd-agent
      notify: Restart datadog-agent

    - name: Enable and start Datadog agent
      ansible.builtin.service:
        name: datadog-agent
        state: started
        enabled: true

    # ── Firewall ───────────────────────────────────────────────────────────────

    - name: Open port 80 in firewalld (if running)
      ansible.posix.firewalld:
        port: 80/tcp
        permanent: true
        state: enabled
        immediate: true
      ignore_errors: true   # AL2023 may not use firewalld; SG handles it

  handlers:
    - name: Reload nginx
      ansible.builtin.service:
        name: nginx
        state: reloaded

    - name: Reload systemd
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Restart datadog-agent
      ansible.builtin.service:
        name: datadog-agent
        state: restarted
