server {
    listen 80 default_server;
    server_name _;

    root /opt/demo/web;
    index index.html;

    # Serve the demo page
    location / {
        try_files $uri $uri/ =404;
    }

    # Proxy the kill button to the sidecar
    # nginx will go down mid-response after the sidecar triggers systemctl stop nginx
    location /kill {
        proxy_pass         http://127.0.0.1:8080/kill;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 5s;
    }

    # Sidecar health (internal only, not exposed publicly via this block)
    location /healthz {
        proxy_pass http://127.0.0.1:8080/healthz;
        allow 127.0.0.1;
        deny  all;
    }
}
