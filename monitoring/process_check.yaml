# /etc/datadog-agent/conf.d/process.d/conf.yaml
# Datadog process check — detects nginx disappearing within ~15 seconds.
# Faster than the HTTP synthetic check for live demo purposes.

init_config:
  min_collection_interval: 10

instances:
  - name: nginx
    search_string:
      - "nginx"
    thresholds:
      critical: [1, 1]
    collect_children: false
    user: root
