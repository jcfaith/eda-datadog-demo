---
# Inventory for the EDA + Datadog demo
# Add this as a Source in AAP under the "EDA Demo" inventory.
# Replace the placeholder values with your actual EC2 details.

all:
  children:
    demo_hosts:
      hosts:
        eda-demo-host:
          ansible_host: 100.53.143.106
          ansible_user: ec2-user              # Amazon Linux 2023 default
          ansible_ssh_private_key_file: ~/.ssh/eda-demo-key
          ansible_ssh_common_args: "-o StrictHostKeyChecking=no"
